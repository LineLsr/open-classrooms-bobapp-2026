name: CI/CD Pipeline

# Déclencheurs :
# - push vers dev : intégration continue sur la branche de développement
# - pull_request ciblant main : vérification complète avant merge
#   (types: opened, synchronize, reopened = cycle de vie normal de la PR ;
#    closed = capture du merge pour déclencher le push Docker)
on:
  push:
    branches: [ dev ]
  pull_request:
    branches: [ main ]
    types: [ opened, synchronize, reopened, closed ]

jobs:

  # ─────────────────────────────────────────────
  # JOB 1 — Tests back-end (Spring Boot / JaCoCo)
  # ─────────────────────────────────────────────
  test-backend:
    runs-on: ubuntu-latest  # VM Linux fournie par GitHub
    # Skip si la PR est fermée sans merge (inutile de tester du code non mergé)
    if: github.event_name == 'push' || github.event.action != 'closed' || github.event.pull_request.merged == true
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4  # Récupère le code source du dépôt

      - name: Installation de Java 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'  # Distribution OpenJDK maintenue par Eclipse

      - name: Lancement des tests et génération du rapport JaCoCo
        working-directory: back  # Exécuté dans le dossier back/
        run: mvn --batch-mode verify  # Compile, teste et génère le rapport de couverture JaCoCo

      - name: Upload du rapport de couverture JaCoCo
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report               # Nom de l'artifact pour le récupérer plus tard
          path: back/target/site/jacoco/    # Dossier généré par JaCoCo

  # ─────────────────────────────────────────────
  # JOB 2 — Tests front-end (Angular / Istanbul)
  # S'exécute en parallèle avec test-backend
  # ─────────────────────────────────────────────
  test-frontend:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event.action != 'closed' || github.event.pull_request.merged == true
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Installation de Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Installation des dépendances
        working-directory: front
        run: npm ci  # Installation propre depuis package-lock.json (plus fiable que npm install en CI)

      - name: Lancement des tests et génération de la couverture
        working-directory: front
        # --watch=false : mode non-interactif adapté à la CI
        # --browsers=ChromeHeadless : Chrome sans interface graphique
        # --code-coverage : génère le rapport Istanbul au format lcov
        run: npm run test -- --watch=false --browsers=ChromeHeadless --code-coverage

      - name: Upload du rapport de couverture front
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage        # Nom de l'artifact
          path: front/coverage/bobapp/   # Dossier généré par Istanbul

  # ─────────────────────────────────────────────
  # JOB 3 — Analyse qualité SonarCloud
  # Attend la fin des jobs 1 et 2 pour disposer
  # des deux rapports de couverture.
  # La Quality Gate bloque toujours : si elle
  # n'est pas passée, la PR ne peut pas être mergée.
  # ─────────────────────────────────────────────
  sonarcloud-analysis:
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]  # Ne démarre qu'après la réussite des deux jobs précédents
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Historique Git complet requis par SonarCloud pour l'analyse des branches

      - name: Téléchargement du rapport JaCoCo
        uses: actions/download-artifact@v4
        with:
          name: jacoco-report
          path: back/target/site/jacoco/  # Doit correspondre au chemin déclaré dans sonar-project.properties

      - name: Téléchargement du rapport de couverture front
        uses: actions/download-artifact@v4
        with:
          name: frontend-coverage
          path: front/coverage/bobapp/    # Doit correspondre au chemin déclaré dans sonar-project.properties

      - name: Installation de Java 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Compilation du back-end
        working-directory: back
        run: mvn --batch-mode compile  # Génère les .class nécessaires à l'analyse statique Java de SonarCloud

      - name: Analyse SonarCloud
        uses: SonarSource/sonarcloud-github-action@master
        with:
          # Sur pull_request : attend la Quality Gate et fait échouer le job si elle n'est pas passée.
          # Cela bloque le merge de la PR via les status checks obligatoires.
          # Sur push (dev) : analyse lancée sans attente — limitation du plan gratuit SonarCloud
          # qui ne supporte pas la vérification de Quality Gate sur les branches courtes.
          args: >
            ${{ github.event_name == 'pull_request' && '-Dsonar.qualitygate.wait=true' || '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}  # Permet à SonarCloud de commenter les PR
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}     # Token d'authentification SonarCloud (GitHub Secret)

  # ─────────────────────────────────────────────
  # JOB 4 — Vérification du build Docker back-end
  # Vérifie que le Dockerfile back-end est valide
  # sans publier d'image. Bloque le merge si le
  # build échoue.
  # ─────────────────────────────────────────────
  build-backend:
    runs-on: ubuntu-latest
    needs: [sonarcloud-analysis]  # Attend la réussite de l'analyse SonarCloud
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Build de l'image Docker back-end (vérification)
        run: docker build ./back -t bobapp-back:verify  # Build local uniquement, pas de push

  # ─────────────────────────────────────────────
  # JOB 5 — Vérification du build Docker front-end
  # S'exécute en parallèle avec build-backend
  # ─────────────────────────────────────────────
  build-frontend:
    runs-on: ubuntu-latest
    needs: [sonarcloud-analysis]  # Attend la réussite de l'analyse SonarCloud
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Build de l'image Docker front-end (vérification)
        run: docker build ./front -t bobapp-front:verify  # Build local uniquement, pas de push

  # ─────────────────────────────────────────────
  # JOB 6 — Publication des images Docker
  # Déclenché uniquement lors du merge d'une PR
  # vers main, après validation complète du code
  # (tests + Quality Gate + builds Docker vérifiés).
  # ─────────────────────────────────────────────
  push-docker:
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]  # Attend la réussite des deux vérifications de build
    if: github.event_name == 'pull_request' && github.event.pull_request.merged == true
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Connexion à Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}  # Identifiants Docker Hub stockés en GitHub Secrets
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build et push de l'image back-end
        uses: docker/build-push-action@v5
        with:
          context: ./back   # Dossier contenant le Dockerfile du back-end
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/bobapp-back:latest  # Image taguée latest sur Docker Hub

      - name: Build et push de l'image front-end
        uses: docker/build-push-action@v5
        with:
          context: ./front  # Dossier contenant le Dockerfile du front-end
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/bobapp-front:latest
